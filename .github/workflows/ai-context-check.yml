name: AI Context Check

on:
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Check AI context files are up-to-date
        run: python tools/ai/generate_ai_context_files.py --check
