<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 520" font-family="'Open Sans', Arial, sans-serif" font-size="14">
  <defs>
    <style>
      .box { fill: #ffffff; stroke: #2c2c2c; stroke-width: 1.5; rx: 6; ry: 6; }
      .box-inner { fill: #fff8f0; stroke: #f79939; stroke-width: 1.2; rx: 4; ry: 4; }
      .box-adapter { fill: #f5f5f5; stroke: #888888; stroke-width: 1.2; rx: 4; ry: 4; }
      .box-outer { fill: #fafafa; stroke: #2c2c2c; stroke-width: 1.5; rx: 6; ry: 6; }
      .line { stroke: #2c2c2c; stroke-width: 1.5; fill: none; }
      .text-main { fill: #2c2c2c; font-weight: 600; text-anchor: middle; }
      .text-sub { fill: #666666; font-size: 12px; text-anchor: middle; }
      .text-adapter { fill: #2c2c2c; font-size: 12px; font-weight: 500; text-anchor: middle; }
    </style>
  </defs>

  <!-- skforecast ecosystem -->
  <rect class="box" x="260" y="20" width="200" height="44"/>
  <text class="text-main" x="360" y="47">skforecast ecosystem</text>

  <!-- Connector -->
  <line class="line" x1="360" y1="64" x2="360" y2="95"/>

  <!-- ForecasterFoundation -->
  <rect class="box-inner" x="240" y="95" width="240" height="52"/>
  <text class="text-main" x="360" y="117">ForecasterFoundation</text>
  <text class="text-sub" x="360" y="136">(forecasting)</text>

  <!-- Connector -->
  <line class="line" x1="360" y1="147" x2="360" y2="178"/>

  <!-- FoundationModel -->
  <rect class="box-inner" x="240" y="178" width="240" height="52"/>
  <text class="text-main" x="360" y="200">FoundationModel</text>
  <text class="text-sub" x="360" y="219">(skforecast Wrapper)</text>

  <!-- Connectors to fit/predict -->
  <line class="line" x1="265" y1="230" x2="265" y2="265"/>
  <line class="line" x1="455" y1="230" x2="455" y2="265"/>

  <!-- .fit() -->
  <rect class="box" x="180" y="265" width="170" height="52"/>
  <text class="text-main" x="265" y="287">.fit()</text>
  <text class="text-sub" x="265" y="306">(Store Context)</text>

  <!-- .predict() -->
  <rect class="box" x="370" y="265" width="170" height="52"/>
  <text class="text-main" x="455" y="287">.predict()</text>
  <text class="text-sub" x="455" y="306">(Zero-Shot Run)</text>

  <!-- Connectors down to adapters box -->
  <line class="line" x1="265" y1="317" x2="265" y2="348"/>
  <line class="line" x1="455" y1="317" x2="455" y2="348"/>
  <!-- Merge into single line -->
  <line class="line" x1="265" y1="348" x2="455" y2="348"/>
  <line class="line" x1="360" y1="348" x2="360" y2="370"/>

  <!-- Internal Model Adapters outer box -->
  <rect class="box-outer" x="60" y="370" width="600" height="120"/>
  <text class="text-main" x="360" y="395">Internal Model Adapters</text>

  <!-- Chronos -->
  <rect class="box-adapter" x="90" y="410" width="120" height="56"/>
  <text class="text-adapter" x="150" y="444">Chronos</text>

  <!-- TimesFM -->
  <rect class="box-adapter" x="235" y="410" width="120" height="56"/>
  <text class="text-adapter" x="295" y="444">TimesFM</text>

  <!-- Moirai -->
  <rect class="box-adapter" x="380" y="410" width="120" height="56"/>
  <text class="text-adapter" x="440" y="444">Moirai</text>

  <!-- TabICL -->
  <rect class="box-adapter" x="525" y="410" width="120" height="56"/>
  <text class="text-adapter" x="585" y="444">TabICL</text>
</svg>